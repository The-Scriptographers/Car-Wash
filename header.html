<!-- Header Section -->
<header id="header" class="hero">
  <div class="hero-content">
    <h1 class="fade-in">Ulf's Bilpleie</h1>
    <p class="fade-in">Velkommen til Ulf's Bilpleie</p>
    <button id="bookAppointment" class="slide-up">Bestill Time</button>
  </div>
</header>

<style>
  /* Header Animations*/
  .fade-in {
    opacity: 0;
    transform: translateY(-20px);
    animation: fadeIn 1s ease forwards;
  }

  .slide-up {
    opacity: 0;
    transform: translateY(30px);
    animation: slideUp 1s ease forwards;
  }

  @keyframes fadeIn {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes slideUp {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
</style>

<script>
  // Activating Header-animasjons when loading
  document.addEventListener("DOMContentLoaded", () => {
    const headerElements = document.querySelectorAll(".fade-in, .slide-up");
    headerElements.forEach((el) => el.classList.add("animated"));
  });
</script>

<style>
  /* Navbar Animations */
  .slide-down {
    opacity: 0;
    transform: translateY(-50px);
    animation: slideDown 1s ease forwards;
  }

  @keyframes slideDown {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
</style>

<script>
  // Navbar shows with animation with DOMContentLoaded
  document.addEventListener("DOMContentLoaded", () => {
    const navbar = document.querySelector(".slide-down");
    navbar.classList.add("animated");
  });
</script>
